<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>conditional statement in js</title>
</head>
<body>
    <script>
        // conditional statement in js is used to perform different actions based on different conditions
        // if statement, if else statement, nested if statement, switch statement, ternary operator
        // if statement
        let age=18;
        if(age>=18){
            console.log("you are eligible to vote");
        }
        // if else statement
        let num=10;
        if(num%2==0){
            console.log(num+" is even number");
        }else{
            console.log(num+" is odd number");
        }
        // nested if statement
        let marks=85;
        if(marks>=90){
            console.log("grade A");
        }else if(marks>=80){
            console.log("grade B");
        }else if(marks>=70){
            console.log("grade C");
        }else{
            console.log("grade D");
        }
        // switch statement
        let day=3;
        switch(day){
            case 1:
                console.log("monday");
                break;
            case 2:
                console.log("tuesday");
                break;
            case 3:
                console.log("wednesday");
                break;
            case 4:
                console.log("thursday");
                break;
            case 5:
                console.log("friday");
                break;
            case 6:
                console.log("saturday");
                break;
            case 7:
                console.log("sunday");
                break;
            default:
                console.log("invalid day");
        }
        // ternary operator
        let num1=5;
        let num2=10;
        let max=(num1>num2)?num1:num2;
        console.log("the maximum number is"+max);
    </script>
</body>
</html>
